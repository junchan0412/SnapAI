name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-14

    steps:
      - name: Checkout
        # actions/checkout v4, pinned to an immutable commit SHA.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Toolchain
        run: |
          xcode-select -p
          swift --version

      - name: Whitespace Check
        run: git diff --check

      - name: Logic Target Boundary Check
        run: scripts/check-logic-symlinks.sh

      - name: SwiftPM Build
        run: swift build

      - name: SwiftPM Tests
        run: SNAPAI_LOGIC_TESTS=1 swift test

      - name: Logic Test Wrapper
        run: scripts/run-logic-tests.sh
