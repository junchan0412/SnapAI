name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain
        run: |
          xcode-select -p
          swift --version

      - name: Whitespace Check
        run: git diff --check

      - name: SwiftPM Build
        run: swift build

      - name: SwiftPM Tests
        run: SNAPAI_LOGIC_TESTS=1 swift test

      - name: Logic Test Wrapper
        run: scripts/run-logic-tests.sh
